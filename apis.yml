aid: data-gov-il
name: gov.il
description: >-
  gov.il is a open data portal open-data portal for isr running CKAN.
  It exposes the CKAN catalog API, a standardized machine-readable interface over approximately 1,194 datasets,
  supporting programmatic dataset search, metadata retrieval, and resource access. Because it runs CKAN, it shares a
  consistent API surface with every other CKAN portal, making it uniformly harvestable and integrable.
kind: government
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/data-gov-il/refs/heads/main/apis.yml
