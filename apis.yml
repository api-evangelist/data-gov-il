apis:
  - aid: data-gov-il:catalog
    name: gov.il CKAN Action API
    description: >-
      CKAN Action API for gov.il, a consistent JSON-over-HTTP interface over a catalog of 1,194 datasets. Standard actions include package_search, package_show, package_list, organization_list, group_list, tag_list, and resource_search; datastore_search is available where the DataStore extension is enabled. Base URL https://data.gov.il/api/3/action/.
    humanURL: https://data.gov.il
    baseURL: https://data.gov.il/api/3/action
